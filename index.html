<script>

// Load voices when available
window.speechSynthesis.onvoiceschanged = ()=>{
    window.speechSynthesis.getVoices();
};

const output = document.getElementById("output");

let isSpeaking = false;

function speak(text){
    if(!text || text.trim().length === 0) return;
    
    // Pause recognition while speaking to avoid capturing our own speech
    let wasListening = isListening;
    if(typeof recognition !== 'undefined' && isListening){
        try{
            recognition.abort();
        }catch(e){
            console.log('Could not abort recognition before speaking', e);
        }
    }
    
    const speech = new SpeechSynthesisUtterance(text);
    speech.lang = "en-US";
    speech.volume = 1;
    speech.rate = 1.0;  // Normal speed for clarity
    speech.pitch = 1.8;  // Slightly higher pitch for naturalness
    
    let voices = window.speechSynthesis.getVoices();
    let femaleVoice = voices.find(v => v.name.toLowerCase().includes('zira')) ||
                      voices.find(v => v.name.toLowerCase().includes('female')) ||
                      voices.find(v => v.name.toLowerCase().includes('woman')) ||
                      voices.find(v => v.name.toLowerCase().includes('victoria')) ||
                      voices.find(v => v.name.toLowerCase().includes('anna')) ||
                      (voices.length > 1 ? voices[1] : voices[0]);
    if(femaleVoice) speech.voice = femaleVoice;
    
    isSpeaking = true;
    
    speech.onend = ()=>{
        isSpeaking = false;
        // Immediately restart recognition if it was active before speaking
        if(wasListening && typeof recognition !== 'undefined' && isListening){
            try{ 
                recognition.start(); 
            }catch(e){ 
                console.log('Restart recognition failed', e); 
                // Try again after minimal delay
                setTimeout(()=>{ 
                    try { if(isListening) recognition.start(); } catch(e2) { console.log('Second restart attempt failed', e2); }
                }, 20);
            }
        }
    };
    
    speech.onerror = (e)=>{ 
        isSpeaking = false; 
        console.error("Speech error:", e.error); 
        // Attempt to restart recognition even on error
        if(wasListening && typeof recognition !== 'undefined' && isListening){
            try { recognition.start(); } catch(e2) { console.log('Error recovery restart failed', e2); }
        }
    };
    
    try {
        // Start speaking immediately
        window.speechSynthesis.speak(speech);
    } catch(e) {
        isSpeaking = false;
        console.error("Speak error:", e);
    }
}

// Speak text with a specific language code (if available)
function speakText(text, langCode){
    if(!text || text.trim().length === 0) return;
    const utter = new SpeechSynthesisUtterance(text);
    utter.lang = langCode || 'en-US';
    utter.volume = 1;
    utter.rate = 1.0;
    utter.pitch = 1.0;
    let voices = window.speechSynthesis.getVoices();
    // Try to pick a voice that matches the language code
    let voice = voices.find(v => v.lang && v.lang.toLowerCase().startsWith((utter.lang||'').toLowerCase())) ||
                voices.find(v => v.name.toLowerCase().includes('female')) ||
                voices[0];
    if(voice) utter.voice = voice;
    try{ window.speechSynthesis.cancel(); window.speechSynthesis.speak(utter); }catch(e){ console.error('speakText error', e); }
}

// Translate text using LibreTranslate (fallback to Google Translate if it fails)
async function translateAndSpeak(text, targetLang){
    if(!text || text.trim().length === 0) return;
    const languageMap = {
        'english': 'en','spanish': 'es','french': 'fr','german': 'de','italian': 'it','portuguese': 'pt',
        'russian':'ru','japanese':'ja','chinese':'zh','korean':'ko','arabic':'ar','hindi':'hi',
        'turkish':'tr','dutch':'nl','greek':'el','polish':'pl','vietnamese':'vi','thai':'th',
        'czech':'cs','swedish':'sv','norwegian':'no','finnish':'fi','danish':'da','hebrew':'he',
        'urdo':'ur','urdu':'ur','malay':'ms','indonesian':'id','tagalog':'tl','afrikaans':'af',
        'hungarian':'hu','romanian':'ro','slovenian':'sl','bulgarian':'bg','serbian':'sr','catalan':'ca',
        'basque':'eu'
    };
    const tl = (languageMap[targetLang.toLowerCase()] || targetLang.toLowerCase());
    output.innerHTML = `🌐 Translating to ${targetLang}: ${text}`;

    try{
        const res = await fetch('https://libretranslate.de/translate', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ q: text, source: 'auto', target: tl, format: 'text' })
        });
        if(!res.ok) throw new Error('Translation API error');
        const data = await res.json();
        const translated = data.translatedText || '';
        output.innerHTML = `🌐 ${targetLang} translation: ${translated}`;
        // Speak the translated text in the target language if possible
        speakText(translated, tl);
    }catch(e){
        console.warn('LibreTranslate failed, falling back to Google Translate', e);
        // Fallback: open Google Translate page with prefilled text
        openUrl('https://translate.google.com/?sl=auto&tl=' + encodeURIComponent(tl) + '&text=' + encodeURIComponent(text));
        speak('Opened Google Translate for you');
    }
}

const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
let recognition;
let speechRecognitionSupported = !!SpeechRecognition;
const voiceSupportMessage = document.getElementById('voiceSupportMessage');

if(!speechRecognitionSupported) {
    console.error("Speech Recognition not supported");
    output.innerHTML = "❌ Speech Recognition not supported in this browser.";
    if(voiceSupportMessage) {
        voiceSupportMessage.innerHTML = "Voice commands require Chrome/Edge on HTTPS or localhost and microphone permission. If you opened this page via file://, use a local server instead.";
    }
} else {
    recognition = new SpeechRecognition();
    recognition.continuous = true;
    recognition.interimResults = true;
    recognition.maxAlternatives = 1;
    recognition.lang = "en-US";
}

let isListening = false;
let lastExecutedCommand = "";
let lastProcessedResultIndex = -1;
let lastCommandTimestamp = 0;
const COMMAND_COOLDOWN = 2000; // ms

function openUrl(url){
    try{
        // reuse same named tab to avoid multiple duplicates
        window.open(url, 'hina_tab');
    }catch(e){
        window.open(url, '_blank');
    }
}

function getTimeGreeting(){
    const hour = new Date().getHours();
    if(hour >= 5 && hour < 12) {
        return "Good morning boss";
    } else if(hour >= 12 && hour < 17) {
        return "Good afternoon boss";
    } else if(hour >= 17 && hour < 21) {
        return "Good evening boss";
    } else {
        return "Good night boss";
    }
}

function startListening(){
    if(!speechRecognitionSupported){
        output.innerHTML = "❌ Voice commands not available";
        return;
    }
    if(isListening) return;
    
    speak("hello boss");
    isListening = true;
    lastExecutedCommand = "";
    output.innerHTML = "hello boss";
    
    try{
        recognition.start();
    } catch(e){
        console.log("Start error:", e.message);
        output.innerHTML = "❌ Microphone denied";
        isListening = false;
    }
}

function stopListening(){
    isListening = false;
    output.innerHTML = "⏹️ Voice assistant stopped";
    try{
        recognition.abort();
    } catch(e){
        console.log("Stop error:", e.message);
    }
}

recognition.onresult = function(event){
    // Fast path for final results
    for(let i = event.resultIndex; i < event.results.length; i++){
        if(event.results[i].isFinal){
            const cmd = event.results[i][0].transcript.toLowerCase().trim();
            if(cmd.length > 0 && cmd !== lastExecutedCommand){
                lastExecutedCommand = cmd;
                output.innerHTML = "🗣️ <b>" + cmd + "</b>";
                processCommand(cmd);
                return;
            }
        }
    }
    
    // Interim feedback
    if(!isSpeaking){
        let interim = '';
        for(let i = event.resultIndex; i < event.results.length; i++){
            if(!event.results[i].isFinal){
                interim += event.results[i][0].transcript + ' ';
            }
        }
        if(interim.trim()) output.innerHTML = "🎤 " + interim.trim();
    }
};

function processCommand(command){
    const now = Date.now();
    if(command === lastExecutedCommand && (now - lastCommandTimestamp) < COMMAND_COOLDOWN){
        return;
    }
    lastCommandTimestamp = now;

    // Personal questions - check these FIRST before any "what is" matchers
    if(command.includes("who are you") || command.includes("what is your name")){
        speak("My name is Hina. I am an advanced AI voice assistant designed to help you with web searches, opening applications and websites, checking weather and news, managing your calendar, and much more. I can open over fifty websites and services, from YouTube to GitHub. I have a female voice and I'm here to make your digital life easier. You can control me by voice commands or keyboard shortcuts. What would you like me to help with?");
        output.innerHTML = "🤖 I'm Hina - an AI Voice Assistant | I can: Search the web, Open apps & websites, Check weather & news, Manage calendar, And more! Ask me anything!";
        return;
    }
    else if(command.includes("help") || command.includes("what can you do") || command.includes("capabilities")){
        speak("I can open websites, apps, search the web, tell you the time and date, and respond to your commands");
        output.innerHTML = "ℹ️ I can search, open apps, tell time/date, and more!";
        return;
    }

    // Farewell commands
    else if(command.includes("bye") || command.includes("goodbye") || command.includes("see you later") || command.includes("see you") || command.includes("catch you later") || command.includes("farewell") || command.includes("adios") || command.includes("take care")){
        const farewellResponses = [
            "bye boss",
            "have a great day",
            "have a good day",
            "see you later",
            "catch you later",
            "goodbye boss",
            "have a wonderful day",
            "take care boss"
        ];
        const randomFarewell = farewellResponses[Math.floor(Math.random() * farewellResponses.length)];
        speak(randomFarewell);
        output.innerHTML = "👋 " + randomFarewell;
        isListening = false;
        setTimeout(()=>{
            try{
                recognition.stop();
            } catch(e){
                console.log("Stop error:", e.message);
            }
        }, 1000);
        return;
    }

    // Stop listening command
    else if(command.includes("stop") || command.includes("exit") || command.includes("quit")){
        speak("Stopping voice assistant");
        output.innerHTML = "⏹️ Voice assistant stopped";
        isListening = false;
        recognition.stop();
        return;
    }

    // Search Commands (Google-like)
    else if(command.includes("search") || command.includes("google") || command.includes("find")){
        const searchQuery = command.replace(/search|google|find|for|on/gi, '').trim();
        if(searchQuery.length > 0){
            speak("Searching for " + searchQuery);
            openUrl("https://www.google.com/search?q=" + encodeURIComponent(searchQuery));
            return;
        }
    }
    // Date & Time Commands
    else if(command.includes("what time") || command.includes("what is the time") || command.includes("tell me the time") || command.includes("current time") || command === "time"){
        const time = new Date().toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', second: '2-digit' });
        speak("The current time is " + time);
        output.innerHTML = "⏰ Current time: " + time;
        return;
    }
    else if(command.includes("what date") || command.includes("what is the date") || command.includes("tell me the date") || command.includes("current date") || command === "date"){
        const date = new Date().toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
        speak("Today is " + date);
        output.innerHTML = "📅 Today: " + date;
        return;
    }
    // Define/Meaning
    else if(command.includes("define") || command.includes("meaning of") || (command.includes("what is") && !command.includes("current time") && !command.includes("what is the time") && !command.includes("time"))){
        const word = command.replace(/define|meaning of|what is/gi, '').trim();
        if(word.length > 0){
            speak("Looking up " + word);
            openUrl("https://www.google.com/search?q=define+" + encodeURIComponent(word));
            return;
        }
    }
    // Calculator
    else if(command.includes("calculate") || command.includes("multiply") || command.includes("divide") || command.includes("add") || command.includes("subtract")){
        speak("Opening calculator");
        openUrl("https://www.google.com/search?q=calculator");
        return;
    }
    // Weather
    else if(command.includes("weather") || command.includes("temperature") || command.includes("forecast")){
        speak("Checking weather");
        openUrl("https://weather.com");
        return;
    }
    // News
    else if(command.includes("news") || command.includes("headlines")){
        speak("Opening news");
        openUrl("https://news.google.com");
        return;
    }
    // Email variations
    else if(command.includes("email") || command.includes("gmail")){
        speak("Opening Gmail");
        openUrl("https://mail.google.com");
        return;
    }
    // Maps variations
    else if(command.includes("map") || command.includes("location") || command.includes("where")){
        speak("Opening Maps");
        openUrl("https://maps.google.com");
        return;
    }
    // Advanced Translation - translate text to any language
    else if(command.includes("translate")){
        // Extract text and target language from commands like
        // "translate hello world to french" or "translate hello into german"
        const toPattern = /translate\s+(.+?)\s+to\s+([\w-]+)/i;
        const intoPattern = /translate\s+(.+?)\s+into\s+([\w-]+)/i;
        let toMatch = command.match(toPattern);
        let intoMatch = command.match(intoPattern);

        if(!toMatch && !intoMatch){
            speak("Opening Translator");
            openUrl("https://translate.google.com");
            return;
        }

        const textToTranslate = (toMatch ? toMatch[1] : intoMatch[1]).trim();
        const targetLanguage = (toMatch ? toMatch[2] : intoMatch[2]).trim();
        if(textToTranslate.length > 0){
            speak("Translating to " + targetLanguage);
            // Use the API-based translator then speak the result; falls back to Google Translate on error
            translateAndSpeak(textToTranslate, targetLanguage);
            return;
        }
    }
    // Images
    else if(command.includes("image") || command.includes("picture") || command.includes("photo")){
        const imageQuery = command.replace(/image|picture|photo|of/gi, '').trim();
        if(imageQuery.length > 0){
            speak("Searching images for " + imageQuery);
            openUrl("https://www.google.com/search?tbm=isch&q=" + encodeURIComponent(imageQuery));
            return;

    // Spotify Music Search
    else if(command.includes("spotify") && (command.includes("play") || command.includes("search"))){
        const songQuery = command.replace(/play|search|on|spotify/gi, '').trim();
        if(songQuery.length > 0){

            openUrl("https://open.spotify.com/search/" + encodeURIComponent(songQuery));

        else {
            speak("Opening Spotify");
            openUrl("https://open.spotify.com");

        return;

    // YouTube Video/Movie Search
    else if(command.includes("youtube") && (command.includes("watch") || command.includes("search") || command.includes("movie") || command.includes("video") || command.includes("song"))){

        const songQuery = command.replace(/play|search|song|music|album|on/gi, '').trim();

recognition.onerror = (event)=>{
    if(event.error === 'aborted') return;
    
    // Only show critical errors
    if(event.error === 'not-allowed' || event.error === 'audio-capture'){
        output.innerHTML = "❌ " + event.error.toUpperCase();
        return;
    }
    
    // Recover instantly for other errors
    if(isListening && !isSpeaking){
        try {
            recognition.start();
        } catch(e) {
            setTimeout(()=>{ if(isListening && !isSpeaking) recognition.start(); }, 10);
        }
    }
};

recognition.onend = ()=>{
    // Instant restart for continuous hearing
    if(isListening && !isSpeaking){
        try{
            recognition.start();
        } catch(e) {
            setTimeout(()=>{
                if(isListening && !isSpeaking) recognition.start();
            }, 10);
        }
    }
};

// Clap Detection Setup
let audioContext = null;
let analyser = null;
let microphone = null;
let clapDetectionActive = false;
let lastClapTime = 0;
const CLAP_COOLDOWN = 1000; // ms between claps to avoid multiple triggers

async function initClapDetection(){
    if(clapDetectionActive) return;
    
    try {
        const stream = await navigator.mediaDevices.getUserMedia({audio: true});
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
        microphone = audioContext.createMediaStreamAudioSource(stream);
        analyser = audioContext.createAnalyser();
        analyser.fftSize = 2048;
        microphone.connect(analyser);
        
        clapDetectionActive = true;
        detectClap();
    } catch(e) {
        console.log("Clap detection not available:", e.message);
    }
}

function detectClap(){
    if(!clapDetectionActive || !analyser) return;
    
    const dataArray = new Uint8Array(analyser.frequencyBinCount);
    
    function checkAudio(){
        requestAnimationFrame(checkAudio);
        analyser.getByteFrequencyData(dataArray);
        
        // Calculate average frequency magnitude
        let sum = 0;
        for(let i = 0; i < dataArray.length; i++) {
            sum += dataArray[i];
        }
        const average = sum / dataArray.length;
        
        // Check for sudden loud sound (clap threshold)
        if(average > 120) {
            const now = Date.now();
            if(now - lastClapTime > CLAP_COOLDOWN) {
                lastClapTime = now;
                handleClap();
            }
        }
    }
    checkAudio();
}

function handleClap(){
    const greeting = getTimeGreeting();
    speak(greeting);
    output.innerHTML = "👋 " + greeting;
    
    // Add visual feedback animation
    output.classList.add('clap-detected');
    setTimeout(()=>{
        output.classList.remove('clap-detected');
    }, 500);
}

// Initialize clap detection on load
try {
    window.addEventListener('load', ()=>{
        setTimeout(initClapDetection, 1000);
    });
} catch(e) {
    console.log("Could not initialize clap detection:", e);
}

// Three.js scene setup (optional - won't break if it fails)
let scene, camera, renderer, cube;
function initThree(){
  try {
    if(typeof THREE === 'undefined') {
        console.log("Three.js not loaded, skipping 3D animation");
        return;
    }
    const canvas = document.getElementById('scene');
    if(!canvas) return;
    renderer = new THREE.WebGLRenderer({canvas, antialias:true});
    renderer.setSize(canvas.clientWidth, canvas.clientHeight);
    scene = new THREE.Scene();
    camera = new THREE.PerspectiveCamera(45, canvas.clientWidth/canvas.clientHeight, 0.1, 100);
    camera.position.z = 5;
    const geometry = new THREE.BoxGeometry(1,1,1);
    const material = new THREE.MeshStandardMaterial({color: 0x00ffff});
    cube = new THREE.Mesh(geometry, material);
    scene.add(cube);
    const light = new THREE.DirectionalLight(0xffffff,1);
    light.position.set(5,5,5);
    scene.add(light);
    animate();
  } catch(error) {
    console.log("Three.js initialization failed (optional feature):", error);
  }
}
function animate(){
  try {
    if(!cube || !renderer || !scene || !camera) return;
    requestAnimationFrame(animate);
    cube.rotation.x += 0.01;
    cube.rotation.y += 0.01;
    renderer.render(scene, camera);
  } catch(error) {
    console.log("Animation error (non-critical):", error);
  }
}
try {
  window.addEventListener('load', initThree);
} catch(error) {
  console.log("Could not attach load listener for Three.js");
}

// Toast feedback
function showToast(message){
  const toast = document.createElement('div');
  toast.className = 'toast';
  toast.textContent = message;
  document.body.appendChild(toast);
  setTimeout(()=>{ toast.remove(); }, 3000);
}

// Keyboard shortcuts
document.addEventListener('keydown', (event)=>{
  // Don't intercept keyboard events when typing in the text input
  if(event.target.id === 'commandInput') return;
  
  if(event.key.toLowerCase() === 's' || event.key === 'Enter') {
    event.preventDefault();
    if(!isListening) startListening();
  }
  if(event.key === 'Escape' || event.key === ' ') {
    event.preventDefault();
    if(isListening) stopListening();
  }
});

// Text input command handler
try {
  const commandInput = document.getElementById('commandInput');
  if(commandInput) {
    commandInput.addEventListener('keypress', function(event){
      if(event.key === 'Enter') {
        const command = this.value.trim().toLowerCase();
        if(command.length > 0) {
          output.innerHTML = "🗣 You said: " + command;
          processCommand(command);
          this.value = '';
        }
      }
    });
  }
} catch(error) {
  console.log("Could not attach text input listener:", error);
}
